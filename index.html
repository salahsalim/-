<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>نظام إدارة السلوك والتعليم - النسخة المحلية</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', 'Segoe UI', system-ui, sans-serif;
        }
        body {
            background: #e2e8f0;
            padding-bottom: 20px;
        }
        .bubble-effect {
            box-shadow: 0 10px 25px rgba(0,0,0,0.08), inset 0 2px 10px rgba(255,255,255,0.9);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            flex-direction: column;
            gap: 20px;
        }
        .app {
            display: none;
        }
        
        .bottom-nav {
            margin-top: 40px;
            background: #0f172a;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            border-top: 3px solid #1e293b;
            z-index: 999;
            flex-wrap: wrap;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.3);
            border-radius: 16px;
        }
        .bottom-btn {
            background: #1e293b;
            color: #e2e8f0;
            border: 1px solid #334155;
            padding: 8px 14px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
            text-decoration: none;
        }
        .bottom-btn:hover {
            background: #334155;
            border-color: #475569;
            color: white;
        }
        .bottom-btn.active {
            background: #2563eb;
            border-color: #3b82f6;
            color: white;
            box-shadow: 0 0 10px rgba(37, 99, 235, 0.5);
        }

        .content {
            padding: 24px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .page {
            display: none;
        }
        .page.active {
            display: block;
        }
        
        .students-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(135px, 1fr));
            gap: 12px;
            margin-top: 10px;
        }
        
        .student-card {
            border-radius: 12px;
            padding: 10px 8px;
            cursor: pointer;
            text-align: center;
            border: 2px solid var(--border-color, #cbd5e1);
            transition: all 0.1s ease;
            position: relative;
            top: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80px;
            color: var(--text-color, #1e293b);
            background: var(--bg-gradient, #ffffff);
            box-shadow: 0 4px 0 var(--shadow-color, #cbd5e1);
        }
        .student-card:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 var(--shadow-color, #cbd5e1);
        }

        .student-name {
            font-size: 0.85rem;
            font-weight: 800;
            line-height: 1.25;
            word-wrap: break-word;
            overflow-wrap: break-word;
            text-align: center;
            width: 100%;
        }

        .student-level-badge {
            background: rgba(255,255,255,0.3);
            color: inherit;
            padding: 1px 6px;
            border-radius: 4px;
            font-size: 9px;
            font-weight: 800;
            margin-top: 4px;
            border: 1px solid rgba(255,255,255,0.5);
            display: inline-block;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15,23,42,0.7);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: 0.3s;
        }
        .modal-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-content {
            background: #f8fafc;
            border-radius: 30px;
            width: 95%;
            max-width: 800px;
            max-height: 92vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 60px rgba(0,0,0,0.3);
            transform: scale(0.9);
            transition: 0.2s ease;
            overflow: hidden; 
        }
        .modal-overlay.show .modal-content {
            transform: scale(1);
        }
        
        .modal-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 10px;
            justify-content: center;
        }
        .modal-tab {
            background: #f1f5f9;
            border: none;
            padding: 10px 20px;
            border-radius: 100px;
            font-weight: bold;
            cursor: pointer;
            color: #64748b;
        }
        .modal-tab.active {
            background: #3b82f6;
            color: white;
        }
        .modal-view {
            display: none;
        }
        .modal-view.active {
            display: block;
        }

        .behaviors-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 15px 0;
        }
        .behavior-btn {
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 12px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 0 4px 0 #e2e8f0;
            transition: 0.1s ease;
            position: relative;
            top: 0;
        }
        .behavior-btn:active {
            top: 4px;
            box-shadow: 0 0 0 #e2e8f0;
        }
        .btn-positive {
            border-color: #d1fae5;
            box-shadow: 0 4px 0 #a7f3d0;
        }
        .btn-edu-positive {
            border-color: #bfdbfe;
            box-shadow: 0 4px 0 #93c5fd;
        }
        .report-item {
            border-bottom: 2px dashed #e2e8f0;
            padding: 16px 0;
            font-size: 14px;
            font-weight: 500;
        }
        .close-modal {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border: none;
            padding: 16px;
            width: 100%;
            border-radius: 16px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            color: white;
            box-shadow: 0 5px 0 #000;
            transition: 0.1s ease;
            position: relative;
            top: 0;
        }
        .close-modal:active {
            top: 5px;
            box-shadow: 0 0 0 #000;
        }
        .settings-card {
            background: white;
            border-radius: 30px;
            padding: 35px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
        }
        .flex-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
            margin-top: 15px;
        }
        .btn-primary {
            background: linear-gradient(to bottom, #3b82f6, #2563eb);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 0 #1d4ed8;
            transition: 0.1s ease;
            position: relative;
            top: 0;
        }
        .btn-primary:active {
            top: 4px;
            box-shadow: 0 0 0 #1d4ed8;
        }
        .btn-success {
            background: linear-gradient(to bottom, #10b981, #059669);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 0 #047857;
            transition: 0.1s ease;
            position: relative;
            top: 0;
        }
        .btn-success:active {
            top: 4px;
            box-shadow: 0 0 0 #047857;
        }
        .btn-action {
            background: #f1f5f9;
            border: 1px solid #cbd5e1;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            color: #0f172a;
            box-shadow: 0 3px 0 #cbd5e1;
            position: relative;
            top: 0;
            transition: 0.1s;
        }
        input, select, textarea {
            border-radius: 12px;
            border: 2px solid #cbd5e1;
            padding: 12px 20px;
            font-size: 15px;
            outline: none;
        }
        .user-card {
            border: 2px solid #f1f5f9;
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 20px;
            background: #fafcff;
        }
        .user-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 12px;
            border-bottom: 2px dashed #e2e8f0;
            flex-wrap: wrap;
            gap: 10px;
        }
        .behaviors-tag {
            display: inline-flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
        }
        .behav-chip {
            background: white;
            border: 2px solid #e0e7ff;
            border-radius: 8px;
            padding: 8px 18px;
            font-size: 14px;
            font-weight: bold;
            box-shadow: 0 2px 0 #e0e7ff;
            display: flex;
            align-items: center;
        }
        .logs-table {
            width: 100%;
            border-collapse: collapse;
            text-align: right;
            font-size: 14px;
            background: white;
            border-radius: 12px;
            overflow: hidden;
        }
        .logs-table th {
            background: #f1f5f9;
            padding: 12px;
            border: 1px solid #cbd5e1;
        }
        .logs-table td {
            padding: 10px 12px;
            border: 1px solid #e2e8f0;
        }
        .chart-container {
            display: flex;
            align-items: flex-end;
            height: 200px;
            gap: 15px;
            background: #f8fafc;
            padding: 20px;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            margin-top: 15px;
            overflow-x: auto;
        }
        .chart-bar-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            min-width: 50px;
            height: 100%;
            justify-content: flex-end;
        }
        .chart-bar {
            width: 100%;
            max-width: 40px;
            border-radius: 8px 8px 0 0;
            transition: 0.5s ease;
            position: relative;
        }
        .chart-bar span {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-weight: bold;
            font-size: 12px;
        }
        .modal-sticky-header {
            background: #ffffff;
            padding: 25px 30px;
            border-bottom: 2px solid #e2e8f0;
            text-align: center;
        }
        .modal-scrollable-body {
            padding: 25px 30px;
            overflow-y: auto;
            flex: 1;
        }
        .modal-sticky-footer {
            background: white;
            padding: 20px 30px;
            border-top: 2px solid #e2e8f0;
        }
        
        /* تصفيف صناديق الدخول المحدث للموبايل */
        .login-box {
            background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%); 
            border: 2px solid var(--box-border-color, #cbd5e1); 
            border-radius: 24px; 
            padding: 24px 16px; 
            cursor: pointer; 
            text-align: center; 
            height: 170px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            position: relative;
            top: 0;
            box-shadow: 0 8px 0 var(--box-shadow-color, #94a3b8);
            transition: transform 0.1s;
            -webkit-tap-highlight-color: transparent;
        }
        .login-box:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 var(--box-shadow-color, #94a3b8);
        }

        @media (max-width: 768px) {
            .content { padding: 12px; }
            .students-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; }
            .student-card { padding: 8px 6px; min-height: 70px; }
            .student-name { font-size: 0.75rem; }
            .settings-card { padding: 15px; }
            .flex-row { flex-direction: column; align-items: stretch; gap: 10px; }
            .btn-primary, .btn-success, .btn-action, input, select, textarea { width: 100% !important; }
            .bottom-nav { margin-top: 20px; padding: 10px; gap: 8px; }
            .bottom-btn { font-size: 11px; padding: 6px 10px; }
        }
    </style>
</head>
<body>

<div id="loginScreen" class="login-container" style="padding: 40px 20px;">
    <h1 style="color: white; text-align: center; margin-bottom: 30px; text-shadow: 0 2px 4px rgba(0,0,0,0.3); font-weight: 900;">🏫 بوابة الدخول السريع للمجموعات والصفوف</h1>
    <div id="loginGrid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; width: 100%; max-width: 900px; justify-content: center;"></div>
</div>

<div id="appContainer" class="app">
    
    <div id="page-home" class="page active content">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: white; padding: 15px 20px; border-radius: 20px; flex-wrap: wrap; gap: 15px;">
            <div style="display: flex; align-items: center; gap: 10px;">
                <label for="classFilter" style="font-weight: bold; color: #1e293b;">📌 تصفية الصفوف:</label>
                <select id="classFilter" style="font-weight: bold; padding: 8px 16px; border-radius: 10px; border: 2px solid #cbd5e1; outline: none;">
                    <option value="all">كل المجموعات</option>
                </select>
            </div>
            <div style="background: #f0fdf4; color: #166534; padding: 5px 15px; border-radius: 50px; font-size: 12px; font-weight: bold;">🟢 النظام يعمل محلياً وآمن تماماً</div>
        </div>
        <div id="studentsGrid" class="students-grid"></div>
    </div>

    <div id="page-ledger_view" class="page content">
        <div class="settings-card" style="border: 3px solid #8b5cf6; background: #faf5ff;">
            <h3 style="margin-bottom: 15px; color: #6d28d9; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
                <span>📊 كشف الرصد النهائي والدرجات الشاملة للطلاب</span>
                <button onclick="printFinalLedger()" class="btn-primary" style="background: #8b5cf6; box-shadow: 0 4px 0 #5b21b6;">🖨️ طباعة كشف الرصد الشامل</button>
            </h3>
            <div id="finalScoreLedgerContainer_dedicated" style="overflow-x:auto;"></div>
        </div>
    </div>

    <div id="page-logs" class="page content">
        <div class="modal-tabs" style="margin-bottom:20px;">
            <button class="modal-tab active" id="tab-detailed-logs">السجلات المفصلة (للطلاب)</button>
            <button class="modal-tab" id="tab-comp-logs">السجل الشامل للطلاب</button>
        </div>
        <div id="view-detailed-logs" class="modal-view active">
            <div id="globalLogsList"></div>
        </div>
        <div id="view-comp-logs" class="modal-view">
            <div class="flex-row" style="margin-bottom:20px; background:white; padding:15px; border-radius:20px;">
                <select id="compLogClassFilter" style="flex:1;">
                    <option value="all">كل الصفوف</option>
                </select>
                <button id="printCompLogBtn" class="btn-primary">🖨️ طباعة السجل</button>
            </div>
            <div id="compLogTableContainer"></div>
        </div>
    </div>

    <div id="page-mentorship" class="page content">
        <div id="mentorshipDashboardContent"></div>
    </div>

    <div id="page-settings" class="page content">
        <div id="adminSettingsContent">
            <div class="settings-card">
                <h3 style="margin-bottom: 20px;">💾 إدارة البيانات (حفظ واستعادة)</h3>
                <div class="flex-row">
                    <button onclick="exportData()" class="btn-primary" style="background: #1e293b;">📥 تحميل البيانات كملف</button>
                    <label class="btn-success" style="cursor:pointer;">
                        📤 استعادة من ملف
                        <input type="file" id="importFile" style="display:none;" accept=".json" onchange="importData(event)">
                    </label>
                </div>
            </div>

            <div class="settings-card" style="border: 3px solid #3b82f6;">
                <h3 style="margin-bottom: 20px; color: #1d4ed8;">🔑 إدارة الرموز السرية</h3>
                <div style="background: #f8fafc; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #e2e8f0;">
                    <h4 style="margin-bottom:10px;">🔑 رمز الإعدادات (الافتراضي 1973):</h4>
                    <div class="flex-row">
                        <input type="password" id="settingsPasswordInput" style="flex:1;" placeholder="الرمز الجديد">
                        <button onclick="saveSettingsPassword()" class="btn-primary">حفظ</button>
                    </div>
                </div>
                <div id="classPasswordsContainer"></div>
            </div>

            <!-- بقية أقسام الإعدادات تظل كما هي (التبني، استيراد الطلاب، السلوكيات) -->
            <div class="settings-card" style="border: 3px solid #10b981;">
                <h3 style="margin-bottom: 20px; color: #047857;">👥 نظام الإشراف التربوي</h3>
                <div class="flex-row">
                    <input type="text" id="newMentorshipName" placeholder="اسم المجموعة" style="flex:2;">
                    <select id="newMentorshipSupervisor" style="flex:1;"></select>
                    <button onclick="createMentorshipGroup()" class="btn-success">➕ إنشاء</button>
                </div>
                <div id="mentorshipAdminContainer"></div>
            </div>

            <div class="settings-card" id="classManagerCard">
                <h3>📚 إدارة الصفوف</h3>
                <div id="classesList" style="margin-bottom: 20px;"></div>
                <div class="flex-row">
                    <input type="text" id="newClassName" placeholder="اسم الصف">
                    <button id="addClassBtnSettings" class="btn-primary">إضافة</button>
                </div>
            </div>
            <!-- تم اختصار العرض هنا لسهولة القراءة، الكود الوظيفي بالأسفل كامل -->
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-tab bottom-btn active" data-page="home">🏠 الطلاب</button>
        <button class="nav-tab bottom-btn" data-page="ledger_view" id="ledgerViewTab" style="display:none;">📊 كشف الرصد</button>
        <button class="nav-tab bottom-btn" data-page="logs" id="logsTabNav">📜 السجلات</button>
        <button class="nav-tab bottom-btn" data-page="mentorship" id="mentorshipTabNav" style="display:none;">👥 الإشراف</button>
        <button class="nav-tab bottom-btn" id="settingsTab" data-page="settings" style="display:none;">⚙️ الإعدادات</button>
        <button class="bottom-btn" id="logoutBtn" style="background:#ef4444; color:white;">🚪 خروج</button>
    </div>

</div>

<!-- المودالات المتبقية (كلمة السر، تفاصيل الطالب، إلخ) -->
<div id="passwordModal" class="modal-overlay">
    <div class="modal-content" style="max-width: 420px; text-align: center; padding: 30px;">
        <h3 id="passwordModalTitle" style="margin-bottom: 10px;"></h3>
        <p id="passwordModalSub" style="margin-bottom: 20px; font-size: 13px; color: #64748b;"></p>
        <input type="password" id="passwordModalInput" style="text-align: center; margin-bottom: 20px; width:100%;">
        <div id="managerOptionsContainer" style="display: none; flex-direction: column; gap: 10px; margin-bottom: 20px;">
            <button id="managerAllStudentsBtn" class="btn-success">📊 دخول عام</button>
            <select id="managerClassSelect" style="width:100%;"></select>
            <button id="managerClassConfirmBtn" class="btn-primary">📚 دخول بصف محدد</button>
        </div>
        <div style="display: flex; gap: 10px;">
            <button id="passwordModalSubmit" class="btn-primary" style="flex: 1;">🚪 دخول</button>
            <button id="passwordModalCancel" class="close-modal" style="flex: 1; background: #e2e8f0; color: #475569;">إلغاء</button>
        </div>
    </div>
</div>

<div id="detailModal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-sticky-header">
            <h2 id="modalStudentName" style="font-size:28px;"></h2>
            <div id="modalPointsInfo"></div>
        </div>
        <div class="modal-scrollable-body" id="modalDynamicContent"></div>
        <div class="modal-sticky-footer">
            <button class="close-modal" id="closeModalDetail">إغلاق</button>
        </div>
    </div>
</div>

<script>
    // --- البيانات الأساسية ---
    const approvedClassesList = ["مجموعة اقرأ (ق)", "مجموعة رتل (ق)", "مجموعة ارتق (ق)", "مجموعة اقرأ (ج)", "مجموعة رتل (ج)", "مجموعة ارتق (ج)"];
    const initialUsersList = [
        { id: "u1", username: "admin", password: "123", role: "admin", status: "active", assignedClasses: [...approvedClassesList] },
        { id: "u2", username: "seifi", password: "123", role: "teacher", status: "active", assignedClasses: ["مجموعة اقرأ (ق)", "مجموعة اقرأ (ج)"] },
        { id: "u3", username: "salem", password: "123", role: "teacher", status: "active", assignedClasses: ["مجموعة رتل (ق)", "مجموعة رتل (ج)"] },
        { id: "u4", username: "majed", password: "123", role: "teacher", status: "active", assignedClasses: ["مجموعة ارتق (ق)", "مجموعة ارتق (ج)"] }
    ];
    
    let students = [], classes = [], mentorshipGroups = [], users = [], logs = [], rolesList = [], roleBehaviors = {}, positiveBehaviors = [], positiveEduBehaviors = [], negativeEduBehaviors = [], pointStatuses = [];
    let settingsPassword = "1973", classPasswords = {}, currentUser = null, nextStudentId = 1, nextUserId = 1, nextGroupId = 1, warnThreshold = 45;

    // --- تهيئة البيانات ---
    function loadData() {
        const storedStudents = localStorage.getItem("students");
        if (!storedStudents) {
            // تحميل قائمة الـ 54 طالب الافتراضية لأول مرة
            students = [

    function saveData() {

        localStorage.setItem("pointStatuses", JSON.stringify(pointStatuses));
        localStorage.setItem("roleBehaviors", JSON.stringify(roleBehaviors));
        localStorage.setItem("positiveBehaviors", JSON.stringify(positiveBehaviors));
        localStorage.setItem("positiveEduBehaviors", JSON.stringify(positiveEduBehaviors));
        localStorage.setItem("negativeEduBehaviors", JSON.stringify(negativeEduBehaviors));
        localStorage.setItem("settingsPassword", settingsPassword);
        localStorage.setItem("classPasswords", JSON.stringify(classPasswords));
        localStorage.setItem("nextStudentId", nextStudentId);
        localStorage.setItem("warnThreshold", warnThreshold);
    }

    // --- نظام الدخول ---
    function renderLoginGrid() {
        const grid = document.getElementById("loginGrid");
        let html = "";
        classes.forEach(c => {
            html += `<div class="login-box" onclick="attemptLogin('${c}', 'class')" style="--box-border-color: #3b82f6; --box-shadow-color: #1d4ed8;">
                        <div style="font-size:30px;">📚</div><div style="font-weight:900;">${c}</div>
                    </div>`;
        });
        html += `<div class="login-box" onclick="attemptLogin('المدير العام', 'admin')" style="--box-border-color: #f59e0b; --box-shadow-color: #b45309;">
                    <div style="font-size:30px;">👑</div><div style="font-weight:900;">المدير العام</div>
                </div>`;
        grid.innerHTML = html;
    }

    let currentLoginTarget = "", currentLoginType = "";
    function attemptLogin(target, type) {
        currentLoginTarget = target;
        currentLoginType = type;
        document.getElementById("passwordModalTitle").innerText = target;
        document.getElementById("passwordModalInput").value = "";
        document.getElementById("managerOptionsContainer").style.display = type === 'admin' ? "flex" : "none";
        document.getElementById("passwordModal").classList.add("show");
    }

    document.getElementById("passwordModalSubmit").onclick = () => {
        const pass = document.getElementById("passwordModalInput").value;
        if (currentLoginType === 'admin') {
            if (pass === settingsPassword) {
                currentUser = { id: "u1", username: "المدير", role: "admin", assignedClasses: [...classes] };
                enterApp("all");
            } else alert("❌ خطأ");
        } else {
            if (pass === (classPasswords[currentLoginTarget] || "123")) {
                currentUser = { id: "u_temp", username: "معلم", role: "teacher", assignedClasses: [currentLoginTarget] };
                enterApp(currentLoginTarget);
            } else alert("❌ خطأ");
        }
    };

    function enterApp(filterValue) {
        document.getElementById("loginScreen").style.display = "none";
        document.getElementById("appContainer").style.display = "block";
        document.getElementById("passwordModal").classList.remove("show");
        
        const filter = document.getElementById("classFilter");
        filter.innerHTML = (currentUser.role === 'admin' ? `<option value="all">كل المجموعات</option>` : "") + 
                           currentUser.assignedClasses.map(c => `<option value="${c}">${c}</option>`).join("");
        filter.value = filterValue;

        if (currentUser.role === 'admin') {
            document.getElementById("settingsTab").style.display = "block";
            document.getElementById("ledgerViewTab").style.display = "block";
            document.getElementById("mentorshipTabNav").style.display = "block";
        }
        renderStudents();
    }

    // --- إدارة الطلاب ---
    function getTotal(s) { return (s.points || 0) + (s.eduPoints || 0); }
    
    function getStudentStatusInfo(pts) {
        return pointStatuses.find(st => pts >= st.min && pts <= st.max) || { label: "-", color: "#fff", shadow: "#ccc" };
    }

    function renderStudents() {
        const grid = document.getElementById("studentsGrid");
        const selected = document.getElementById("classFilter").value;
        const filtered = students.filter(s => selected === 'all' || s.class === selected);
        filtered.sort((a,b) => getTotal(b) - getTotal(a));

        grid.innerHTML = filtered.map(s => {
            const info = getStudentStatusInfo(getTotal(s));
            return `<div class="student-card" onclick="openStudent(${s.id})" style="--shadow-color: ${info.shadow}; background: ${info.color};">
                        <div class="student-name">${s.name}</div>
                        <div class="student-level-badge">${info.label} | ${getTotal(s)}</div>
                    </div>`;
        }).join("");
    }

    window.openStudent = (id) => {
        const s = students.find(x => x.id === id);
        document.getElementById("modalStudentName").innerText = s.name;
        renderStudentDetails(s);
        document.getElementById("detailModal").classList.add("show");
    };

    function renderStudentDetails(s) {
        const info = getStudentStatusInfo(getTotal(s));
        document.getElementById("modalPointsInfo").innerHTML = `رصيده الحالي: ${getTotal(s)} [${info.label}]`;
        
        let html = `<div class="behaviors-list">`;
        // إيجابيات
        positiveBehaviors.forEach(b => {
            html += `<div class="behavior-btn btn-positive" onclick="applyPoint(${s.id}, '${b.name}', ${b.points}, 'positive', 'behavior')">
                        <span>${b.name}</span> <span>+${b.points}</span>
                    </div>`;
        });
        // سلبيات المعلم
        (roleBehaviors[currentUser.role] || []).forEach(b => {
            html += `<div class="behavior-btn" onclick="applyPoint(${s.id}, '${b.name}', ${b.points}, 'negative', 'behavior')">
                        <span>${b.name}</span> <span>-${b.points}</span>
                    </div>`;
        });
        html += `</div>`;
        document.getElementById("modalDynamicContent").innerHTML = html;
    }

    window.applyPoint = (sid, name, pts, type, track) => {
        const s = students.find(x => x.id === sid);
        const before = track === 'behavior' ? s.points : s.eduPoints;
        const after = type === 'positive' ? before + pts : Math.max(0, before - pts);
        
        if (track === 'behavior') s.points = after; else s.eduPoints = after;
        
        logs.unshift({
            studentName: s.name,
            behavior: name,
            points: pts,
            after: after,
            type: type,
            track: track,
            userName: currentUser.username,
            timestamp: new Date().toLocaleString('ar-OM')
        });
        
        saveData();
        renderStudents();
        renderStudentDetails(s);
    };

    // --- التنقل ---
    document.querySelectorAll(".nav-tab").forEach(btn => {
        btn.onclick = () => {
            const page = btn.dataset.page;
            document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
            document.getElementById("page-" + page).classList.add("active");
            document.querySelectorAll(".nav-tab").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            if (page === 'settings') renderAdminSettings();
            if (page === 'ledger_view') renderDedicatedFinalScoreLedger();
        };
    });

    // --- وظائف الأدمن ---
    function renderAdminSettings() {
        // إدارة الصفوف
        document.getElementById("classesList").innerHTML = classes.map((c, i) => `
            <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                <span>${c}</span> <button onclick="deleteClass(${i})">حذف</button>
            </div>`).join("");

        // رموز الصفوف
        document.getElementById("classPasswordsContainer").innerHTML = classes.map(c => `
            <div style="margin-bottom:10px;">
                <label>${c}: </label> <input type="text" id="cp_${c}" value="${classPasswords[c]}" onchange="updateClassPass('${c}', this.value)">
            </div>`).join("");
    }

    window.updateClassPass = (c, v) => { classPasswords[c] = v; saveData(); };
    
    window.deleteClass = (i) => { classes.splice(i,1); saveData(); renderAdminSettings(); };

    document.getElementById("addClassBtnSettings").onclick = () => {
        const n = document.getElementById("newClassName").value;
        if(n) { classes.push(n); classPasswords[n] = "123"; saveData(); renderAdminSettings(); }
    };

    window.exportData = () => {
        const data = JSON.stringify({students, classes, logs, mentorshipGroups, pointStatuses, roleBehaviors, settingsPassword, classPasswords});
        const blob = new Blob([data], {type: "application/json"});
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "backup.json";
        a.click();
    };

    window.importData = (e) => {
        const reader = new FileReader();
        reader.onload = (event) => {
            const data = JSON.parse(event.target.result);
            students = data.students; classes = data.classes;
            saveData(); location.reload();
        };
        reader.readAsText(e.target.files[0]);
    };

    document.getElementById("logoutBtn").onclick = () => location.reload();
    document.getElementById("closeModalDetail").onclick = () => document.getElementById("detailModal").classList.remove("show");
    document.getElementById("passwordModalCancel").onclick = () => document.getElementById("passwordModal").classList.remove("show");

    // تهيئة التشغيل
    window.onload = () => {
        loadData();
        renderLoginGrid();
    };

    // كشف الرصد
    function renderDedicatedFinalScoreLedger() {
        const container = document.getElementById("finalScoreLedgerContainer_dedicated");
        let html = `<table class="logs-table"><tr><th>الطالب</th><th>الصف</th><th>الدرجة</th></tr>`;
        students.forEach(s => {
            html += `<tr><td>${s.name}</td><td>${s.class}</td><td>${getTotal(s)}</td></tr>`;
        });
        html += `</table>`;
        container.innerHTML = html;
    }
